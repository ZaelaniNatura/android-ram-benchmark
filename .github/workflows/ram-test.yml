- name: Tulis script test ke file
        run: |
          cat > run_test.sh <<'SCRIPT_EOF'
          set -e
          APK_PATH="v6.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "v6.apk tidak ditemukan di root repo!"
            exit 1
          fi

          adb wait-for-device

          # -g = otomatis grant semua runtime permission (termasuk notifikasi) saat install
          adb install -g -r "$APK_PATH"
          adb shell pm grant com.notelite.player android.permission.POST_NOTIFICATIONS || true

          adb shell am start -n com.notelite.player/.MainActivity
          sleep 6

          # jaga-jaga: kalau masih ada dialog sistem nongol (misal battery optimization), coba dismiss
          for i in 1 2 3; do
            adb shell uiautomator dump /sdcard/perm.xml >/dev/null 2>&1 || true
            adb pull /sdcard/perm.xml perm.xml >/dev/null 2>&1 || true
            if grep -q 'text="Allow"' perm.xml 2>/dev/null; then
              ab=$(grep -oP 'text="Allow"[^>]*bounds="\[[0-9]+,[0-9]+\]\[[0-9]+,[0-9]+\]"' perm.xml | grep -oP '\[[0-9]+,[0-9]+\]\[[0-9]+,[0-9]+\]' | head -1)
              nums=$(echo "$ab" | grep -oP '[0-9]+')
              read -r ax1 ay1 ax2 ay2 <<< "$nums"
              adb shell input tap $(( (ax1 + ax2) / 2 )) $(( (ay1 + ay2) / 2 ))
              sleep 2
            fi
            adb shell am start -n com.notelite.player/.MainActivity
            sleep 2
          done

          adb shell uiautomator dump /sdcard/window.xml
          adb pull /sdcard/window.xml window.xml

          get_center() {
            local id="$1"
            local bounds nums x1 y1 x2 y2
            bounds=$(grep -oP "resource-id=\"com.notelite.player:id/${id}\"[^>]*bounds=\"\[[0-9]+,[0-9]+\]\[[0-9]+,[0-9]+\]\"" window.xml | grep -oP "\[[0-9]+,[0-9]+\]\[[0-9]+,[0-9]+\]" | head -1)
            nums=$(echo "$bounds" | grep -oP "[0-9]+")
            read -r x1 y1 x2 y2 <<< "$nums"
            echo "$(( (x1 + x2) / 2 )) $(( (y1 + y2) / 2 ))"
          }

          read sx sy <<< "$(get_center etSearch)"
          read bx by <<< "$(get_center btnSearch)"

          adb shell input tap $sx $sy
          adb shell input text "$SEARCH_QUERY"
          adb shell input tap $bx $by

          echo "Menunggu lagu mulai diputar..."
          sleep 15

          get_pss() {
            local out pss
            out=$(adb shell dumpsys meminfo com.notelite.player)
            pss=$(echo "$out" | grep -m1 "TOTAL PSS:" | awk '{print $3}')
            if [ -z "$pss" ]; then
              pss=$(echo "$out" | grep -m1 -E '^[[:space:]]*TOTAL[[:space:]]+[0-9]' | awk '{print $2}')
            fi
            echo "$pss"
          }

          echo "timestamp,pss_kb" > ram_log.csv
          ITER=$((DURATION_SECONDS / 5))
          for i in $(seq 1 $ITER); do
            PSS=$(get_pss)
            echo "$(date +%s),$PSS" >> ram_log.csv
            sleep 5
          done

          adb shell screencap -p /sdcard/final.png
          adb pull /sdcard/final.png final_screenshot.png
          SCRIPT_EOF
          chmod +x run_test.sh
