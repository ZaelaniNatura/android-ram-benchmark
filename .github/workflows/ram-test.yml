name: RAM Usage Test - ViMusic Benchmark

on:
  workflow_dispatch:
    inputs:
      duration_seconds:
        description: "Lama monitoring RAM (detik)"
        default: "120"
        required: false

jobs:
  ram-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api29-v2

      - name: Tulis script test ke file
        run: |
          cat > run_test.sh <<'SCRIPT_EOF'
          set -e
          
          # Pastikan 7.apk ini adalah APK ViMusic
          APK_PATH="7.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "7.apk tidak ditemukan di root repo!"
            exit 1
          fi

          echo "Menginstall ViMusic..."
          adb wait-for-device
          adb install -g -r "$APK_PATH"
          
          # Kasih izin notifikasi buat ViMusic (kalau diperlukan)
          adb shell pm grant it.vfsfitvnm.vimusic android.permission.POST_NOTIFICATIONS || true
          
          # Buka aplikasi ViMusic (pakai monkey biar otomatis nyari Launcher Activity-nya)
          echo "Membuka ViMusic..."
          adb shell monkey -p it.vfsfitvnm.vimusic -c android.intent.category.LAUNCHER 1 > /dev/null 2>&1
          sleep 10

          # Karena ViMusic pakai Compose, kita biarkan dia loading database dan UI
          # selama beberapa detik sebelum mulai monitoring RAM.
          echo "Menunggu aplikasi stabil..."
          sleep 15

          get_pss() {
            local out pss
            out=$(adb shell dumpsys meminfo it.vfsfitvnm.vimusic)
            pss=$(echo "$out" | grep -m1 "TOTAL PSS:" | awk '{print $3}')
            if [ -z "$pss" ]; then
              pss=$(echo "$out" | grep -m1 -E '^[[:space:]]*TOTAL[[:space:]]+[0-9]' | awk '{print $2}')
            fi
            echo "$pss"
          }

          echo "timestamp,pss_kb" > ram_log.csv
          ITER=$((DURATION_SECONDS / 5))
          
          echo "Mulai merekam RAM..."
          for i in $(seq 1 $ITER); do
            PSS=$(get_pss)
            echo "$(date +%s),$PSS" >> ram_log.csv
            sleep 5
          done

          # Ambil screenshot terakhir buat bukti aplikasinya beneran jalan
          adb shell screencap -p /sdcard/final.png
          adb pull /sdcard/final.png final_screenshot.png
          SCRIPT_EOF
          chmod +x run_test.sh

      - name: Jalankan RAM test
        uses: reactivecircus/android-emulator-runner@v2
        env:
          DURATION_SECONDS: ${{ github.event.inputs.duration_seconds || '120' }}
        with:
          api-level: 29
          arch: x86_64
          target: google_apis
          profile: pixel_5
          force-avd-creation: false
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-snapshot
          disable-animations: true
          script: bash run_test.sh

      - name: Hitung rata-rata RAM
        run: |
          {
            echo "## Hasil Benchmark RAM - ViMusic"
            echo ""
            awk -F',' 'NR>1 && $2 ~ /^[0-9]+$/ {
              sum += $2; count++
              if (min == "" || $2 < min) min = $2
              if ($2 > max) max = $2
            }
            END {
              if (count > 0) {
                printf "- Jumlah sample: %d\n- Rata-rata PSS: **%.1f MB** (%.0f KB)\n- Min: %.1f MB\n- Max: %.1f MB\n", count, sum/count/1024, sum/count, min/1024, max/1024
              } else {
                print "Tidak ada data RAM terekam. Pastikan APK yang diuji benar-benar ViMusic."
              }
            }' ram_log.csv
          } | tee summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload hasil
        uses: actions/upload-artifact@v4
        with:
          name: ram-test-vimusic
          path: |
            ram_log.csv
            summary.md
            final_screenshot.png
