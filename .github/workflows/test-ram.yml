name: Android RAM Test

on:
  workflow_dispatch:

jobs:
  analyze-memory:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Emulator and Measure RAM
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: arm64-v8a
          force-avd-creation: false
          emulator-boot-timeout: 900
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -no-snapshot
          disable-animations: true
          script: |
            ls -la *.apk
            adb install v6.apk
            adb shell am start -n com.notelite.player/.MainActivity
            sleep 5
            adb shell dumpsys meminfo com.notelite.player | tee meminfo_idle.txt
            adb shell am start-service -n com.notelite.player/.MusicService \
              -a ACTION_PLAY_NEW \
              --es VIDEO_URL "https://www.youtube.com/watch?v=jNQXAC9IVRw" \
              --es SONG_TITLE "RAM Test Song"
            sleep 15
            adb shell dumpsys meminfo com.notelite.player | tee meminfo_playing.txt
            sleep 20
            adb shell dumpsys meminfo com.notelite.player | tee meminfo_steady.txt

      - name: Upload memory reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ram-test-results
          path: |
            meminfo_idle.txt
            meminfo_playing.txt
            meminfo_steady.txt
