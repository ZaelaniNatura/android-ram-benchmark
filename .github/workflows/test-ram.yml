name: Android RAM Test

on:
  workflow_dispatch:

jobs:
  analyze-memory:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Emulator and Measure RAM
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: arm64-v8a
          profile: pixel_5
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            echo "Cek file APK di repo..."
            ls -la *.apk

            adb install v6.apk

            echo "Membuka MainActivity..."
            adb shell am start -n com.notelite.player/.MainActivity
            sleep 5

            echo "=========================================="
            echo "RAM SAAT IDLE (belum play apapun)"
            echo "=========================================="
            adb shell dumpsys meminfo com.notelite.player | tee meminfo_idle.txt

            echo "Trigger play lewat MusicService langsung..."
            adb shell am start-service -n com.notelite.player/.MusicService \
              -a ACTION_PLAY_NEW \
              --es VIDEO_URL "https://www.youtube.com/watch?v=jNQXAC9IVRw" \
              --es SONG_TITLE "RAM Test Song"

            echo "Menunggu audio di-fetch & buffer (15s)..."
            sleep 15

            echo "=========================================="
            echo "RAM SAAT MULAI PLAYING"
            echo "=========================================="
            adb shell dumpsys meminfo com.notelite.player | tee meminfo_playing.txt

            echo "Menunggu steady-state (20s tambahan)..."
            sleep 20

            echo "=========================================="
            echo "RAM STEADY-STATE (~35s play)"
            echo "=========================================="
            adb shell dumpsys meminfo com.notelite.player | tee meminfo_steady.txt

      - name: Upload memory reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ram-test-results
          path: |
            meminfo_idle.txt
            meminfo_playing.txt
            meminfo_steady.txt
